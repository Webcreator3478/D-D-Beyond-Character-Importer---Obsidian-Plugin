name: Run Obsidian Linter Check

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install eslint eslint-plugin-obsidianmd @eslint/js @eslint/json typescript-eslint --save-dev --legacy-peer-deps

      - name: Create ESLint Config
        run: |
          cat > eslint.config.mjs << 'ESLINTEOF'
          import obsidianmd from "eslint-plugin-obsidianmd";

          export default [
            ...obsidianmd.configs.recommended,
            {
              files: ["**/*.ts"],
              languageOptions: {
                parserOptions: {
                  project: "./tsconfig.json",
                },
              },
            },
            {
              ignores: ["main.js", "node_modules/**", "eslint.config.mjs"],
            },
          ];
          ESLINTEOF

      - name: Run Linter
        run: npx eslint .